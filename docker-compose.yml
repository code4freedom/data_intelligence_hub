services:
  parser:
    build:
      context: .
      dockerfile: docker/parser/Dockerfile
    image: rvtools-chunker-parser:local
    volumes:
      - app_data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-rvtools}
    entrypoint: ["/app/docker/parser/entrypoint.sh"]
    # run with: docker compose run --rm parser python run_parser.py --input /data/RVTools.xlsx --sheet vInfo --out /data/chunks --chunk-size 5000

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: rvtools-chunker-backend:local
    volumes:
      - app_data:/data
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-rvtools}
      - POSTGRES_USER=${POSTGRES_USER:-rvtools}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - APP_MAPPING_CSV=${APP_MAPPING_CSV:-/app/tools/app_mapping.example.csv}
      - REPORT_AUTHOR=${REPORT_AUTHOR:-}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend:cached
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: rvtools-chunker-worker:local
    volumes:
      - app_data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-rvtools}
      - POSTGRES_USER=${POSTGRES_USER:-rvtools}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - APP_MAPPING_CSV=${APP_MAPPING_CSV:-/app/tools/app_mapping.example.csv}
      - REPORT_AUTHOR=${REPORT_AUTHOR:-}
    command: ["rq", "worker", "--url", "${REDIS_URL:-redis://redis:6379}", "default"]
    depends_on:
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rvtools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rvtools}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rvtools}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
  neo4jdata:
  miniodata:
  app_data:

