<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RVTools Cluster Graph</title>
  <script src="https://unpkg.com/cytoscape@3.23.0/dist/cytoscape.min.js"></script>
  <style>
    html,body{height:100%;margin:0}
    #cy{width:100%;height:100vh;display:block}
  </style>
</head>
<body>
  <div id="cy"></div>
  <script>
    async function load() {
      const resp = await fetch('/api/graph?manifest=' + encodeURIComponent('manifest_vInfo_localtest.json'))
      const data = await resp.json()
      const elements = []
      data.nodes.forEach(n => elements.push({ data: { id: n.id, label: n.id, type: n.type } }))
      data.edges.forEach(e => elements.push({ data: { id: e.source+'-'+e.target, source: e.source, target: e.target, label: e.type } }))
      const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: elements,
        style: [
          { selector: 'node[type="host"]', style: { 'background-color': '#0D47A1', 'label': 'data(label)', 'color':'#fff' } },
          { selector: 'node[type="vm"]', style: { 'background-color': '#43A047', 'label': 'data(label)', 'width': 20, 'height': 20 } },
          { selector: 'node[type="datastore"]', style: { 'background-color': '#FF8F00', 'label': 'data(label)' } },
          { selector: 'edge', style: { 'line-color': '#9dbaea', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier' } }
        ],
        layout: { name: 'cose', animate: false }
      })
    }
    load().catch(e=>{document.body.innerText='Error: '+e})
  </script>
</body>
</html>
